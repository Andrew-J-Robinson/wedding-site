<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP — The Robinsons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="/tw.css">
  <style>
    body { font-family: 'Lora', Georgia, serif; }
    h1, h2, h3, .font-display { font-family: 'Cormorant Garamond', Georgia, serif; }
  </style>
</head>
<body class="bg-wedding-bg text-charcoal min-h-screen">
  <header class="border-b border-blush/60">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 flex items-center justify-between h-16">
      <a href="/" class="font-display text-lg text-charcoal hover:text-magenta transition">A &amp; M</a>
      <a href="/" class="text-sm text-charcoal/80 hover:text-magenta transition">Back to site</a>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 sm:px-6 py-16 sm:py-20">
    <div class="text-center mb-8">
      <p class="uppercase tracking-[0.25em] text-xs text-lavender">RSVP</p>
      <h1 class="text-3xl sm:text-4xl font-display text-charcoal">Let us know you'll be there</h1>
    </div>
    <div class="bg-surface border border-blush/50 rounded-2xl shadow-sm p-6 sm:p-8 space-y-6" id="rsvp-app">
      <div id="rsvp-loading" class="space-y-5 animate-pulse" aria-busy="true" aria-label="Loading">
        <div class="flex flex-wrap gap-2">
          <div class="h-8 w-36 rounded-full bg-blush/50"></div>
          <div class="h-8 w-40 rounded-full bg-blush/40"></div>
          <div class="h-8 w-32 rounded-full bg-blush/40"></div>
        </div>
        <div class="space-y-3 pt-2">
          <div class="h-4 bg-blush/50 rounded w-28"></div>
          <div class="h-12 bg-blush/40 rounded-xl w-full"></div>
          <div class="h-3 bg-blush/35 rounded w-3/4"></div>
        </div>
        <div class="flex justify-between pt-4">
          <div class="h-10 w-20 rounded-full bg-blush/45"></div>
          <div class="h-10 w-24 rounded-full bg-blush/50"></div>
        </div>
      </div>
      <div id="rsvp-interactive" class="hidden space-y-6">
        <div id="rsvp-stepper" class="flex flex-wrap gap-2 text-sm font-medium text-charcoal/70"></div>
        <div id="rsvp-body" class="space-y-4"></div>
        <div id="rsvp-nav" class="flex justify-between items-center pt-2">
          <button id="rsvp-prev" class="px-4 py-2 rounded-full border border-blush/60 text-charcoal disabled:opacity-50 hover:border-magenta/40 transition" disabled>Back</button>
          <button id="rsvp-next" class="px-5 py-2 rounded-full bg-magenta text-white font-semibold hover:bg-magenta/90 transition">Next</button>
        </div>
        <p id="rsvp-status" class="text-sm text-charcoal/70"></p>
      </div>
    </div>
  </main>

  <footer class="border-t border-blush/60 py-6 text-center text-sm text-charcoal/70 bg-wedding-bg">
    <p>We're so excited to celebrate with you.</p>
  </footer>

  <script src="/scripts/main.js"></script>
</body>
</html>

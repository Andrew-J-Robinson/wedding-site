<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Wedding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/theme.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            charcoal: 'var(--color-charcoal)',
            lavender: 'var(--color-lavender)',
            blush: 'var(--color-blush)',
            magenta: 'var(--color-magenta)',
            'wedding-bg': 'var(--color-bg)',
            surface: 'var(--color-surface)',
            'surface-hover': 'var(--color-surface-hover)',
          },
          fontFamily: {
            display: ['Cormorant Garamond', 'Georgia', 'serif'],
            body: ['Lora', 'Georgia', 'serif'],
          },
        },
      },
    };
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body { font-family: 'Lora', Georgia, serif; }
    h1, h2, h3, .font-display { font-family: 'Cormorant Garamond', Georgia, serif; }
    .placeholder-img { background: repeating-linear-gradient(45deg, var(--color-blush), var(--color-blush) 10px, var(--color-placeholder-stripe) 10px, var(--color-placeholder-stripe) 20px); }
    /* Nav light mode: over hero (dark background) */
    header.nav-light { background: rgba(0,0,0,0.15); border-color: rgba(255,255,255,0.2); }
    header.nav-light .nav-link,
    header.nav-light .nav-logo { color: rgba(255,255,255,0.95); }
    header.nav-light .nav-link:hover,
    header.nav-light .nav-logo:hover { color: var(--color-blush); }
    /* Nav dark mode: over content (light background) */
    header:not(.nav-light) { background: rgba(253,248,247,0.9); border-color: rgba(247,219,216,0.6); }
    header:not(.nav-light) .nav-link,
    header:not(.nav-light) .nav-logo { color: var(--color-charcoal); }
    header:not(.nav-light) .nav-link:hover,
    header:not(.nav-light) .nav-logo:hover { color: var(--color-magenta); }
    header .nav-link,
    header .nav-logo { transition: color 0.2s; }
    @media (prefers-color-scheme: dark) {
      header:not(.nav-light) { background: rgba(26, 21, 20, 0.95); border-color: rgba(74, 66, 69, 0.6); }
      header:not(.nav-light) .nav-link,
      header:not(.nav-light) .nav-logo { color: var(--color-charcoal); }
      header:not(.nav-light) .nav-link:hover,
      header:not(.nav-light) .nav-logo:hover { color: var(--color-magenta); }
    }
  </style>
</head>
<body class="bg-wedding-bg text-charcoal">
  <header id="site-header" class="sticky top-0 z-20 backdrop-blur border-b transition-colors nav-light" data-nav-root>
    <div class="max-w-6xl mx-auto px-4 sm:px-6 flex items-center justify-between h-16">
      <a href="#home" class="nav-logo font-display text-lg">A &amp; M</a>
      <nav class="flex flex-wrap gap-4 sm:gap-6 text-sm font-medium">
        <a href="#how-we-met" class="nav-link">How We Met</a>
        <a href="#photos" class="nav-link">Photos</a>
        <a href="#party" class="nav-link">Wedding Party</a>
        <a href="#schedule" class="nav-link">Schedule</a>
        <a href="#travel" class="nav-link">Travel</a>
        <a href="#qa" class="nav-link">Q&amp;A</a>
        <a href="/registry" class="nav-link">Registry</a>
        <a href="/rsvp" class="nav-link font-semibold">RSVP</a>
      </nav>
    </div>
  </header>

  <main>
    <!-- Hero - Full bleed (extends behind nav via negative margin) -->
    <section id="home" class="relative min-h-screen -mt-16 flex items-end justify-center pb-[15vh]">
      <div class="absolute inset-0 bg-cover bg-center bg-no-repeat placeholder-img" data-photo="hero"></div>
      <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
      <div class="absolute inset-0 bg-charcoal/55"></div>
      <div class="relative z-10 max-w-4xl mx-auto px-4 sm:px-6 text-center text-white">
        <p id="site-hero-kicker" class="uppercase tracking-[0.25em] text-xs text-blush mb-4 drop-shadow-lg"></p>
        <h1 id="site-hero-names" class="text-5xl sm:text-6xl md:text-7xl font-display font-semibold mb-4 drop-shadow-lg"></h1>
        <p id="site-hero-date-line" class="text-xl sm:text-2xl text-white/95 mb-4 drop-shadow-lg"></p>
        <p id="site-hero-blurb" class="text-lg text-white/90 max-w-xl mx-auto mb-8 drop-shadow-lg"></p>
        <div class="flex flex-col sm:flex-row justify-center gap-3">
          <a id="site-hero-cta-rsvp" href="/rsvp" class="inline-flex items-center justify-center px-8 py-4 rounded-full bg-magenta text-white font-semibold shadow-lg hover:bg-magenta/90 transition"></a>
          <a id="site-hero-cta-story" href="#how-we-met" class="inline-flex items-center justify-center px-6 py-4 rounded-full border-2 border-white/80 text-white font-semibold hover:bg-white/10 transition"></a>
        </div>
      </div>
    </section>

    <!-- How We Met -->
    <section id="how-we-met" class="bg-blush/30 py-16 sm:py-20">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 grid md:grid-cols-2 gap-12 items-center">
        <div class="space-y-4">
          <p id="site-how-eyebrow" class="uppercase tracking-[0.25em] text-xs text-lavender"></p>
          <h2 id="site-how-title" class="text-3xl sm:text-4xl font-display text-charcoal"></h2>
          <div id="site-how-paragraphs" class="space-y-4"></div>
        </div>
        <img data-photo="how-we-met" alt="Bride and Groom" class="w-full aspect-[5/4] object-cover rounded-2xl placeholder-img" />
      </div>
    </section>

    <!-- Photos -->
    <section id="photos" class="max-w-6xl mx-auto px-4 sm:px-6 py-16 sm:py-20">
      <div class="flex items-start justify-between gap-4 mb-8">
        <div>
          <p class="uppercase tracking-[0.25em] text-xs text-lavender">Photos</p>
          <h2 class="text-3xl sm:text-4xl font-display text-charcoal">Engagement moments</h2>
        </div>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
        <img data-photo="engagement-1" alt="engagement photo 1" class="aspect-[4/5] w-full h-full object-cover rounded-2xl placeholder-img" />
        <img data-photo="engagement-2" alt="engagement photo 2" class="aspect-square w-full h-full object-cover rounded-2xl placeholder-img" />
        <img data-photo="engagement-3" alt="engagement photo 3" class="aspect-[4/5] w-full h-full object-cover rounded-2xl placeholder-img" />
        <img data-photo="engagement-4" alt="engagement photo 4" class="aspect-square w-full h-full object-cover rounded-2xl placeholder-img" />
        <img data-photo="engagement-5" alt="engagement photo 5" class="aspect-[4/5] w-full h-full object-cover rounded-2xl placeholder-img" />
        <img data-photo="engagement-6" alt="engagement photo 6" class="aspect-square w-full h-full object-cover rounded-2xl placeholder-img" />
      </div>
    </section>

    <!-- Wedding Party (rendered dynamically from settings) -->
    <section id="party" class="bg-blush/20 py-16 sm:py-20">
      <div class="max-w-6xl mx-auto px-4 sm:px-6">
        <p class="uppercase tracking-[0.25em] text-xs text-lavender">Wedding Party</p>
        <h2 class="text-3xl sm:text-4xl font-display text-charcoal mb-8">Our favorite people</h2>
        <div id="party-grid" class="grid sm:grid-cols-2 gap-8 max-w-2xl mx-auto"></div>
      </div>
    </section>

    <!-- Schedule -->
    <section id="schedule" class="max-w-6xl mx-auto px-4 sm:px-6 py-16 sm:py-20">
      <p id="site-schedule-eyebrow" class="uppercase tracking-[0.25em] text-xs text-lavender"></p>
      <h2 id="site-schedule-title" class="text-3xl sm:text-4xl font-display text-charcoal mb-10"></h2>
      <div id="site-schedule-items" class="max-w-2xl space-y-6"></div> 
    </section>

    <!-- Travel & Stay -->
    <section id="travel" class="bg-blush/30 py-16 sm:py-20">
      <div class="max-w-6xl mx-auto px-4 sm:px-6">
        <p id="site-travel-eyebrow" class="uppercase tracking-[0.25em] text-xs text-lavender"></p>
        <h2 id="site-travel-title" class="text-3xl sm:text-4xl font-display text-charcoal mb-8"></h2>
        <div class="grid md:grid-cols-2 gap-8">
          <div id="site-travel-col-0" class="space-y-4"></div>
          <div id="site-travel-col-1" class="space-y-4"></div>
        </div>
      </div>
    </section>

    <!-- Q&A -->
    <section id="qa" class="bg-blush/20 py-16 sm:py-20">
      <div class="max-w-6xl mx-auto px-4 sm:px-6">
        <p id="site-qa-eyebrow" class="uppercase tracking-[0.25em] text-xs text-lavender"></p>
        <h2 id="site-qa-title" class="text-3xl sm:text-4xl font-display text-charcoal mb-6"></h2>
        <div id="site-qa-items" class="divide-y divide-blush/60 border border-blush/50 rounded-2xl bg-surface max-w-3xl"></div>  
      </div>
    </section>
  </main>

  <footer class="border-t border-blush/60 py-8 text-center text-sm text-charcoal/70 bg-wedding-bg">
    <p id="site-footnote-text"></p>
  </footer>

  <script src="/scripts/site-content-defaults.js"></script>
  <script>
    (async () => {
      function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

      function renderTravelColumn(el, blocks) {
        el.textContent = '';
        (blocks || []).forEach(function (block, bi) {
          var h3 = document.createElement('h3');
          h3.className = 'font-semibold text-charcoal text-lg' + (bi > 0 ? ' mt-6' : '');
          h3.textContent = block.heading || '';
          el.appendChild(h3);
          var paras = block.paragraphs || [];
          paras.forEach(function (para, pi) {
            var p = document.createElement('p');
            p.className = paras.length > 1 && pi > 0 ? 'text-charcoal/80 text-sm' : 'text-charcoal/90';
            p.textContent = para;
            el.appendChild(p);
          });
        });
      }

      function renderSiteContent(c) {
        var h = c.hero || {};
        document.getElementById('site-hero-kicker').textContent = h.kicker || '';
        document.getElementById('site-hero-names').textContent = h.names || '';
        document.getElementById('site-hero-date-line').textContent = h.dateLine || '';
        document.getElementById('site-hero-blurb').textContent = h.blurb || '';
        document.getElementById('site-hero-cta-rsvp').textContent = h.ctaRsvp || '';
        document.getElementById('site-hero-cta-story').textContent = h.ctaStory || '';

        var hw = c.howWeMet || {};
        document.getElementById('site-how-eyebrow').textContent = hw.eyebrow || '';
        document.getElementById('site-how-title').textContent = hw.title || '';
        var howParaEl = document.getElementById('site-how-paragraphs');
        howParaEl.textContent = '';
        (hw.paragraphs || []).forEach(function (text) {
          var p = document.createElement('p');
          p.className = 'text-charcoal/90 leading-relaxed';
          p.textContent = text;
          howParaEl.appendChild(p);
        });

        var sch = c.schedule || {};
        document.getElementById('site-schedule-eyebrow').textContent = sch.eyebrow || '';
        document.getElementById('site-schedule-title').textContent = sch.title || '';
        var schedEl = document.getElementById('site-schedule-items');
        schedEl.textContent = '';
        (sch.items || []).forEach(function (item) {
          var row = document.createElement('div');
          row.className = 'flex gap-6 items-start';
          var time = document.createElement('div');
          time.className = 'w-24 shrink-0 font-semibold text-magenta';
          time.textContent = item.time || '';
          var body = document.createElement('div');
          var h3 = document.createElement('h3');
          h3.className = 'font-semibold text-charcoal';
          h3.textContent = item.title || '';
          var det = document.createElement('p');
          det.className = 'text-charcoal/80 text-sm mt-1';
          det.textContent = item.detail || '';
          body.appendChild(h3);
          body.appendChild(det);
          row.appendChild(time);
          row.appendChild(body);
          schedEl.appendChild(row);
        });

        var tr = c.travel || {};
        document.getElementById('site-travel-eyebrow').textContent = tr.eyebrow || '';
        document.getElementById('site-travel-title').textContent = tr.title || '';
        var cols = tr.columns || [[], []];
        renderTravelColumn(document.getElementById('site-travel-col-0'), cols[0] || []);
        renderTravelColumn(document.getElementById('site-travel-col-1'), cols[1] || []);

        var qa = c.qa || {};
        document.getElementById('site-qa-eyebrow').textContent = qa.eyebrow || '';
        document.getElementById('site-qa-title').textContent = qa.title || '';
        var qaEl = document.getElementById('site-qa-items');
        qaEl.textContent = '';
        (qa.items || []).forEach(function (item) {
          var det = document.createElement('details');
          det.className = 'p-4';
          if (item.open) det.setAttribute('open', '');
          var sum = document.createElement('summary');
          sum.className = 'flex justify-between items-center cursor-pointer font-semibold text-charcoal';
          var qSpan = document.createElement('span');
          qSpan.textContent = item.question || '';
          var plus = document.createElement('span');
          plus.className = 'text-magenta';
          plus.textContent = '+';
          sum.appendChild(qSpan);
          sum.appendChild(plus);
          var ans = document.createElement('p');
          ans.className = 'mt-2 text-charcoal/90';
          ans.textContent = item.answer || '';
          det.appendChild(sum);
          det.appendChild(ans);
          qaEl.appendChild(det);
        });

        document.getElementById('site-footnote-text').textContent = (c.footnote && c.footnote.text) || '';
      }

      function renderParty(party, photos) {
        var sides = { bridesmaids: [], groomsmen: [] };
        (party || []).slice().sort(function(a, b) { return (a.order || 0) - (b.order || 0); })
          .forEach(function(m) { (sides[m.side] || sides.bridesmaids).push(m); });

        function card(m) {
          var url = photos[m.key];
          var img = url
            ? '<img src="' + esc(url) + '" alt="' + esc(m.name) + '" class="w-20 h-20 rounded-xl object-cover shrink-0" />'
            : '<div class="w-20 h-20 rounded-xl shrink-0 placeholder-img"></div>';
          return '<div class="p-4 bg-surface rounded-2xl shadow-sm border border-blush/50 flex gap-4 items-center">'
            + img
            + '<div><p class="font-semibold text-charcoal">' + esc(m.name) + '</p>'
            + '<p class="text-sm text-charcoal/70">' + esc(m.role) + '</p></div></div>';
        }

        var html = '';
        if (sides.bridesmaids.length) {
          html += '<div class="space-y-4"><h3 class="text-sm font-semibold uppercase tracking-wider text-charcoal/80">Bridesmaids</h3>'
            + sides.bridesmaids.map(card).join('') + '</div>';
        }
        if (sides.groomsmen.length) {
          html += '<div class="space-y-4"><h3 class="text-sm font-semibold uppercase tracking-wider text-charcoal/80">Groomsmen</h3>'
            + sides.groomsmen.map(card).join('') + '</div>';
        }
        document.getElementById('party-grid').innerHTML = html;
      }

      try {
        var res = await fetch('/api/settings');
        var data = res.ok ? await res.json() : {};
        var content = typeof mergeSiteContent === 'function' ? mergeSiteContent(data.siteContent) : {};
        renderSiteContent(content);
        var photos = data.photos || {};
        var party = data.party || [];

        document.querySelectorAll('[data-photo]').forEach(function(el) {
          var url = photos[el.getAttribute('data-photo')];
          if (!url) return;
          if (el.tagName === 'IMG') {
            el.src = url;
          } else {
            el.style.backgroundImage = "url('" + url + "')";
            el.classList.remove('placeholder-img');
          }
        });

        renderParty(party, photos);
      } catch (_) {
        var fallback = typeof mergeSiteContent === 'function' ? mergeSiteContent({}) : {};
        renderSiteContent(fallback);
        renderParty([], {});
      }
    })();
  </script>

  <script>
    (function() {
      var header = document.getElementById('site-header');
      var hero = document.getElementById('home');
      function updateNav() {
        var heroBottom = hero ? hero.offsetTop + hero.offsetHeight : window.innerHeight;
        var threshold = heroBottom - 80;
        if (window.scrollY < threshold) {
          header.classList.add('nav-light');
        } else {
          header.classList.remove('nav-light');
        }
      }
      window.addEventListener('scroll', function() { updateNav(); }, { passive: true });
      window.addEventListener('resize', updateNav);
      updateNav();
    })();
  </script>
</body>
</html>

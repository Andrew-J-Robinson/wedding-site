<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Robinsons</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="/tw.css">
  <style>
    html { scroll-behavior: smooth; }
    body { font-family: 'Lora', Georgia, serif; }
    h1, h2, h3, .font-display { font-family: 'Cormorant Garamond', Georgia, serif; }
    .placeholder-img { background: repeating-linear-gradient(45deg, var(--color-blush), var(--color-blush) 10px, var(--color-placeholder-stripe) 10px, var(--color-placeholder-stripe) 20px); }
    /* Nav light mode: over hero (dark background) */
    header.nav-light { background: rgba(0,0,0,0.15); border-color: rgba(255,255,255,0.2); }
    header.nav-light .nav-link,
    header.nav-light .nav-logo { color: rgba(255,255,255,0.95); }
    header.nav-light .nav-link:hover,
    header.nav-light .nav-logo:hover { color: var(--color-blush); }
    /* Nav dark mode: over content (light background) */
    header:not(.nav-light) { background: rgba(253,248,247,0.9); border-color: rgba(247,219,216,0.6); }
    header:not(.nav-light) .nav-link,
    header:not(.nav-light) .nav-logo { color: var(--color-charcoal); }
    header:not(.nav-light) .nav-link:hover,
    header:not(.nav-light) .nav-logo:hover { color: var(--color-magenta); }
    header .nav-link,
    header .nav-logo { transition: color 0.2s; }
    header .nav-menu-btn { transition: color 0.2s, border-color 0.2s; }
    header.nav-light .nav-menu-btn { color: rgba(255,255,255,0.95); }
    header:not(.nav-light) .nav-menu-btn { color: var(--color-charcoal); }
    @media (prefers-color-scheme: dark) {
      header:not(.nav-light) { background: rgba(26, 21, 20, 0.95); border-color: rgba(74, 66, 69, 0.6); }
      header:not(.nav-light) .nav-link,
      header:not(.nav-light) .nav-logo,
      header:not(.nav-light) .nav-menu-btn { color: var(--color-charcoal); }
      header:not(.nav-light) .nav-link:hover,
      header:not(.nav-light) .nav-logo:hover { color: var(--color-magenta); }
    }
    #mobile-nav-drawer:not(.hidden) { pointer-events: auto; }
    /* Hero: legibility over bright areas (e.g. white dress) */
    #home .hero-copy {
      text-shadow:
        0 0 1px rgba(0, 0, 0, 0.9),
        0 1px 2px rgba(0, 0, 0, 0.85),
        0 4px 20px rgba(0, 0, 0, 0.55);
    }
    .reveal {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 600ms ease-out, transform 600ms ease-out;
      will-change: opacity, transform;
    }
    .reveal.is-visible {
      opacity: 1;
      transform: none;
    }
    @media (prefers-reduced-motion: reduce) {
      .reveal {
        opacity: 1;
        transform: none;
        transition: none;
      }
    }
  </style>
</head>

  <script src="/scripts/site-content-defaults.js"></script>
  <script>
    (function () {
      function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

      function renderLinkedText(el, text) {
        var re = /\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g;
        var last = 0, match;
        while ((match = re.exec(text)) !== null) {
          if (match.index > last) el.appendChild(document.createTextNode(text.slice(last, match.index)));
          var a = document.createElement('a');
          a.href = match[2];
          a.textContent = match[1];
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.className = 'text-magenta underline hover:text-magenta/80 transition-colors';
          el.appendChild(a);
          last = re.lastIndex;
        }
        if (last < text.length) el.appendChild(document.createTextNode(text.slice(last)));
      }

      function renderTravelColumn(el, blocks) {
        el.textContent = '';
        (blocks || []).forEach(function (block) {
          var card = document.createElement('div');
          card.className = 'rounded-2xl border border-blush/50 bg-surface shadow-sm p-6 sm:p-7 space-y-3';
          var h3 = document.createElement('h3');
          h3.className = 'font-semibold text-charcoal text-lg';
          h3.textContent = block.heading || '';
          card.appendChild(h3);
          var paras = block.paragraphs || [];
          paras.forEach(function (para, pi) {
            var p = document.createElement('p');
            p.className = 'leading-relaxed ' + (paras.length > 1 && pi > 0 ? 'text-charcoal/80 text-sm' : 'text-charcoal/90');
            renderLinkedText(p, para);
            card.appendChild(p);
          });
          el.appendChild(card);
        });
      }

      function renderHeroContent(hero) {
        var h = hero || {};
        document.getElementById('site-hero-kicker').textContent = h.kicker || '';
        document.getElementById('site-hero-names').textContent = h.names || '';
        document.getElementById('site-hero-date-line').textContent = h.dateLine || '';
        var blurbEl = document.getElementById('site-hero-blurb');
        blurbEl.textContent = '';
        renderLinkedText(blurbEl, h.blurb || '');
        document.getElementById('site-hero-cta-rsvp').textContent = h.ctaRsvp || '';
        document.getElementById('site-hero-cta-story').textContent = h.ctaStory || '';
      }

      function renderRestContent(c) {
        var hw = c.howWeMet || {};
        document.getElementById('site-how-eyebrow').textContent = hw.eyebrow || '';
        document.getElementById('site-how-title').textContent = hw.title || '';
        var howParaEl = document.getElementById('site-how-paragraphs');
        howParaEl.textContent = '';
        (hw.paragraphs || []).forEach(function (text) {
          var p = document.createElement('p');
          p.className = 'text-charcoal/90 leading-relaxed';
          renderLinkedText(p, text);
          howParaEl.appendChild(p);
        });

        var sch = c.schedule || {};
        document.getElementById('site-schedule-eyebrow').textContent = sch.eyebrow || '';
        document.getElementById('site-schedule-title').textContent = sch.title || '';
        var schedEl = document.getElementById('site-schedule-items');
        schedEl.textContent = '';
        (sch.items || []).forEach(function (item) {
          var row = document.createElement('div');
          row.className = 'flex gap-6 items-start';
          var time = document.createElement('div');
          time.className = 'w-24 shrink-0 font-semibold text-magenta';
          time.textContent = item.time || '';
          var body = document.createElement('div');
          var h3 = document.createElement('h3');
          h3.className = 'font-semibold text-charcoal';
          h3.textContent = item.title || '';
          var det = document.createElement('p');
          det.className = 'text-charcoal/80 text-sm mt-1';
          renderLinkedText(det, item.detail || '');
          body.appendChild(h3);
          body.appendChild(det);
          row.appendChild(time);
          row.appendChild(body);
          schedEl.appendChild(row);
        });

        var tr = c.travel || {};
        document.getElementById('site-travel-eyebrow').textContent = tr.eyebrow || '';
        document.getElementById('site-travel-title').textContent = tr.title || '';
        var cols = tr.columns || [[], []];
        renderTravelColumn(document.getElementById('site-travel-col-0'), cols[0] || []);
        renderTravelColumn(document.getElementById('site-travel-col-1'), cols[1] || []);

        var qa = c.qa || {};
        document.getElementById('site-qa-eyebrow').textContent = qa.eyebrow || '';
        document.getElementById('site-qa-title').textContent = qa.title || '';
        var qaEl = document.getElementById('site-qa-items');
        qaEl.textContent = '';
        (qa.items || []).forEach(function (item) {
          var det = document.createElement('details');
          det.className = 'p-4';
          if (item.open) det.setAttribute('open', '');
          var sum = document.createElement('summary');
          sum.className = 'flex justify-between items-center cursor-pointer font-semibold text-charcoal';
          var qSpan = document.createElement('span');
          qSpan.textContent = item.question || '';
          var plus = document.createElement('span');
          plus.className = 'text-magenta';
          plus.textContent = '+';
          sum.appendChild(qSpan);
          sum.appendChild(plus);
          var ans = document.createElement('p');
          ans.className = 'mt-2 text-charcoal/90';
          renderLinkedText(ans, item.answer || '');
          det.appendChild(sum);
          det.appendChild(ans);
          qaEl.appendChild(det);
        });

        renderLinkedText(document.getElementById('site-footnote-text'), (c.footnote && c.footnote.text) || '');
      }

      function revealHeroText() {
        var sk = document.getElementById('site-hero-skeleton');
        var rev = document.getElementById('site-hero-reveal');
        if (sk) sk.classList.add('hidden');
        if (!rev) return;
        requestAnimationFrame(function () {
          requestAnimationFrame(function () { rev.classList.remove('opacity-0'); });
        });
      }

      /** Hint the browser to start fetching the hero image and the storage origin asap. */
      function preconnectHeroOrigin(url) {
        try {
          var origin = new URL(url, location.href).origin;
          if (document.querySelector('link[data-hero-preconnect="' + origin + '"]')) return;
          var pc = document.createElement('link');
          pc.rel = 'preconnect';
          pc.href = origin;
          pc.crossOrigin = '';
          pc.setAttribute('data-hero-preconnect', origin);
          document.head.appendChild(pc);
          var dns = document.createElement('link');
          dns.rel = 'dns-prefetch';
          dns.href = origin;
          document.head.appendChild(dns);
        } catch (_) {}
      }

      function preloadHeroImage(url) {
        if (document.querySelector('link[data-hero-preload]')) return;
        var pre = document.createElement('link');
        pre.rel = 'preload';
        pre.as = 'image';
        pre.href = url;
        pre.setAttribute('fetchpriority', 'high');
        pre.setAttribute('data-hero-preload', '');
        document.head.appendChild(pre);
      }

      /** Load hero photo in parallel; fade in when ready. Does not gate text reveal. */
      function loadHeroPhoto(url) {
        var el = document.getElementById('site-hero-photo');
        if (!url || !el) return;
        preconnectHeroOrigin(url);
        preloadHeroImage(url);
        var img = new Image();
        img.fetchPriority = 'high';
        img.decoding = 'async';
        img.onload = function () {
          el.style.backgroundImage = "url('" + url + "')";
          requestAnimationFrame(function () {
            requestAnimationFrame(function () { el.classList.remove('opacity-0'); });
          });
        };
        img.onerror = function () {};
        img.src = url;
      }

      function hydrateRestPhotos(photos) {
        document.querySelectorAll('[data-photo]').forEach(function (el) {
          if (el.getAttribute('data-photo') === 'hero') return;
          var url = photos[el.getAttribute('data-photo')];
          if (!url) return;
          if (el.tagName === 'IMG') {
            el.src = url;
          } else {
            el.style.backgroundImage = "url('" + url + "')";
            el.classList.remove('placeholder-img');
          }
        });
      }

      function renderParty(party, photos) {
        var sides = { bridesmaids: [], groomsmen: [] };
        (party || []).slice().sort(function (a, b) { return (a.order || 0) - (b.order || 0); })
          .forEach(function (m) { (sides[m.side] || sides.bridesmaids).push(m); });

        function card(m) {
          var url = photos[m.key];
          var img = url
            ? '<img src="' + esc(url) + '" alt="' + esc(m.name) + '" loading="lazy" decoding="async" class="w-20 h-20 rounded-xl object-cover shrink-0" />'
            : '<div class="w-20 h-20 rounded-xl shrink-0 placeholder-img"></div>';
          return '<div class="p-4 bg-surface rounded-2xl shadow-sm border border-blush/50 flex gap-4 items-center">'
            + img
            + '<div><p class="font-semibold text-charcoal">' + esc(m.name) + '</p>'
            + '<p class="text-sm text-charcoal/70">' + esc(m.role) + '</p></div></div>';
        }

        var html = '';
        if (sides.bridesmaids.length) {
          html += '<div class="space-y-4"><h3 class="text-sm font-semibold uppercase tracking-wider text-charcoal/80">Bridesmaids</h3>'
            + sides.bridesmaids.map(card).join('') + '</div>';
        }
        if (sides.groomsmen.length) {
          html += '<div class="space-y-4"><h3 class="text-sm font-semibold uppercase tracking-wider text-charcoal/80">Groomsmen</h3>'
            + sides.groomsmen.map(card).join('') + '</div>';
        }
        document.getElementById('party-grid').innerHTML = html;
      }

      function defaultsHero() {
        var defaults = typeof mergeSiteContent === 'function' ? mergeSiteContent({}) : {};
        return defaults.hero || {};
      }

      function defaultsRest() {
        return typeof mergeSiteContent === 'function' ? mergeSiteContent({}) : {};
      }

      function schedule(fn) {
        if (typeof requestIdleCallback === 'function') {
          requestIdleCallback(fn, { timeout: 1500 });
        } else {
          setTimeout(fn, 0);
        }
      }

      // Phase 1: hero (runs immediately).
      (async function loadHero() {
        try {
          var res = await fetch('/api/settings?section=hero');
          var data = res.ok ? await res.json() : {};
          var heroData = (data && typeof data.hero === 'object' && data.hero) || {};
          var merged = Object.assign({}, defaultsHero(), heroData);
          renderHeroContent(merged);
          revealHeroText();
          loadHeroPhoto(data && data.heroPhoto);
        } catch (_) {
          renderHeroContent(defaultsHero());
          revealHeroText();
        }
      })();

      // Phase 2: rest of the page (deferred until idle).
      schedule(async function loadRest() {
        try {
          var res = await fetch('/api/settings');
          var data = res.ok ? await res.json() : {};
          var content = typeof mergeSiteContent === 'function' ? mergeSiteContent(data.siteContent) : {};
          renderRestContent(content);
          hydrateRestPhotos(data.photos || {});
          renderParty(data.party || [], data.photos || {});
        } catch (_) {
          renderRestContent(defaultsRest());
          renderParty([], {});
        }
      });
    })();
  </script>

  <script>
    (function () {
      var targets = document.querySelectorAll('.reveal');
      if (!targets.length) return;
      var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduceMotion || typeof IntersectionObserver !== 'function') {
        targets.forEach(function (el) { el.classList.add('is-visible'); });
        return;
      }
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) {
            e.target.classList.add('is-visible');
            io.unobserve(e.target);
          }
        });
      }, { rootMargin: '0px 0px -10% 0px', threshold: 0.05 });
      targets.forEach(function (el) { io.observe(el); });
    })();
  </script>

  <script>
    (function() {
      var header = document.getElementById('site-header');
      var hero = document.getElementById('home');
      function updateNav() {
        var heroBottom = hero ? hero.offsetTop + hero.offsetHeight : window.innerHeight;
        var threshold = heroBottom - 80;
        if (window.scrollY < threshold) {
          header.classList.add('nav-light');
        } else {
          header.classList.remove('nav-light');
        }
      }
      window.addEventListener('scroll', function() { updateNav(); }, { passive: true });
      window.addEventListener('resize', updateNav);
      updateNav();
    })();
  </script>

  <script>
    (function() {
      var drawer = document.getElementById('mobile-nav-drawer');
      var btn = document.getElementById('nav-menu-btn');
      if (!drawer || !btn) return;
      var openPath = btn.querySelector('.nav-icon-open');
      var closePath = btn.querySelector('.nav-icon-close');
      function setOpen(open) {
        if (open) {
          drawer.classList.remove('hidden');
          drawer.setAttribute('aria-hidden', 'false');
          btn.setAttribute('aria-expanded', 'true');
          btn.setAttribute('aria-label', 'Close menu');
          document.body.style.overflow = 'hidden';
          if (openPath) openPath.classList.add('hidden');
          if (closePath) closePath.classList.remove('hidden');
        } else {
          drawer.classList.add('hidden');
          drawer.setAttribute('aria-hidden', 'true');
          btn.setAttribute('aria-expanded', 'false');
          btn.setAttribute('aria-label', 'Open menu');
          document.body.style.overflow = '';
          if (openPath) openPath.classList.remove('hidden');
          if (closePath) closePath.classList.add('hidden');
        }
      }
      btn.addEventListener('click', function() {
        setOpen(drawer.classList.contains('hidden'));
      });
      drawer.querySelectorAll('[data-close-mobile-nav]').forEach(function(el) {
        el.addEventListener('click', function() { setOpen(false); });
      });
      drawer.querySelectorAll('a.mobile-nav-link').forEach(function(a) {
        a.addEventListener('click', function() { setOpen(false); });
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && !drawer.classList.contains('hidden')) setOpen(false);
      });
      window.addEventListener('resize', function() {
        if (window.matchMedia('(min-width: 768px)').matches) setOpen(false);
      });
    })();
  </script>
</body>
</html>

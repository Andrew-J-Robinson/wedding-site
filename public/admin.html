<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }
    .placeholder-img { background: repeating-linear-gradient(45deg, #e5e7eb, #e5e7eb 10px, #d1d5db 10px, #d1d5db 20px); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <header class="bg-white border-b border-slate-200 py-4">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 flex items-center justify-between">
      <h1 class="text-2xl font-display text-slate-900">Wedding Admin</h1>
      <a class="text-sm text-rose-600 hover:underline" href="/">Back to site</a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-10 space-y-8">
    <section id="admin-login" class="bg-white border border-slate-200 rounded-2xl shadow-sm p-6 space-y-4">
      <h2 class="text-xl font-semibold">Admin Login</h2>
      <div class="flex flex-col sm:flex-row gap-3 sm:items-center">
        <input id="admin-password" type="password" class="flex-1 px-4 py-3 rounded-xl border border-slate-200 focus:border-rose-400 focus:ring-2 focus:ring-rose-100" placeholder="Enter admin password" />
        <button id="admin-login-btn" class="px-5 py-3 rounded-xl bg-rose-600 text-white font-semibold hover:bg-rose-500">Login</button>
      </div>
      <p id="admin-login-status" class="text-sm text-slate-600"></p>
    </section>

    <section id="admin-panels" class="space-y-6 hidden">
      <div class="grid lg:grid-cols-2 gap-6">
        <section class="bg-white border border-slate-200 rounded-2xl shadow-sm p-6 space-y-4">
          <div class="flex items-start justify-between gap-3">
            <div>
              <h3 class="text-lg font-semibold">Upload Invitee List</h3>
              <p class="text-sm text-slate-600">Upload CSV or JSON (name, party, contact).</p>
            </div>
            <button id="admin-save-invitees" class="px-4 py-2 rounded-xl bg-emerald-600 text-white font-semibold hover:bg-emerald-500">Save List</button>
          </div>
          <div class="space-y-3">
            <input id="admin-file" type="file" accept=".csv,.json" class="block text-sm text-slate-600" />
            <textarea id="admin-raw" rows="8" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-rose-400 focus:ring-2 focus:ring-rose-100" placeholder='Or paste JSON array here'></textarea>
            <div class="text-sm text-slate-600">Preview</div>
            <pre id="admin-preview" class="bg-slate-900 text-slate-100 text-xs p-4 rounded-xl h-48 overflow-auto">[]</pre>
          </div>
          <p id="admin-upload-status" class="text-sm text-slate-600"></p>
        </section>

        <section class="bg-white border border-slate-200 rounded-2xl shadow-sm p-6 space-y-4">
          <div class="flex items-center justify-between">
            <div>
              <h3 class="text-lg font-semibold">RSVP Responses</h3>
              <p class="text-sm text-slate-600">Live overview of submissions.</p>
            </div>
            <button id="admin-refresh" class="px-3 py-2 rounded-xl border border-slate-200 hover:border-rose-300 text-sm">Refresh</button>
          </div>
          <div class="grid grid-cols-3 gap-3 text-center text-sm">
            <div class="p-3 rounded-xl bg-emerald-50 text-emerald-700">
              <div class="font-semibold" id="count-yes">0</div>
              <div>Yes</div>
            </div>
            <div class="p-3 rounded-xl bg-amber-50 text-amber-700">
              <div class="font-semibold" id="count-maybe">0</div>
              <div>Maybe</div>
            </div>
            <div class="p-3 rounded-xl bg-rose-50 text-rose-700">
              <div class="font-semibold" id="count-no">0</div>
              <div>No</div>
            </div>
          </div>
          <div class="overflow-auto border border-slate-200 rounded-xl">
            <table class="min-w-full text-sm">
              <thead class="bg-slate-100 text-slate-700">
                <tr>
                  <th class="text-left px-3 py-2">Name</th>
                  <th class="text-left px-3 py-2">RSVP</th>
                  <th class="text-left px-3 py-2">Allergies</th>
                  <th class="text-left px-3 py-2">Note</th>
                  <th class="text-left px-3 py-2">Time</th>
                </tr>
              </thead>
              <tbody id="admin-rsvp-rows" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
          <p id="admin-rsvp-status" class="text-sm text-slate-600"></p>
        </section>
      </div>
    </section>
  </main>

  <script src="./scripts/admin.js"></script>
</body>
</html>

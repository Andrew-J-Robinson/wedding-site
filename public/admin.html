<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            charcoal: 'var(--color-charcoal)',
            lavender: 'var(--color-lavender)',
            blush: 'var(--color-blush)',
            magenta: 'var(--color-magenta)',
            'wedding-bg': 'var(--color-bg)',
          },
          fontFamily: {
            display: ['Cormorant Garamond', 'Georgia', 'serif'],
            body: ['Lora', 'Georgia', 'serif'],
          },
        },
      },
    };
  </script>
  <style>
    :root {
      --color-charcoal: #2a2a2a;
      --color-lavender: #8770b8;
      --color-blush: #f7dbd8;
      --color-magenta: #c6195a;
      --color-bg: #fdf8f7;
    }
    body { font-family: 'Lora', Georgia, serif; }
    h1, h2, h3, .font-display { font-family: 'Cormorant Garamond', Georgia, serif; }
    .placeholder-img { background: repeating-linear-gradient(45deg, var(--color-blush), var(--color-blush) 10px, #eed5d2 10px, #eed5d2 20px); }
  </style>
</head>
<body class="bg-blush/20 text-charcoal">
  <header class="bg-white/80 border-b border-blush/60 py-4">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 flex items-center justify-between">
      <h1 class="text-2xl font-display text-charcoal">Wedding Admin</h1>
      <a class="text-sm text-magenta hover:underline" href="/">Back to site</a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-10 space-y-8">
    <section id="admin-login" class="bg-white/80 border border-blush/50 rounded-2xl shadow-sm p-6 space-y-4">
      <h2 class="text-xl font-semibold text-charcoal">Admin Login</h2>
      <div class="flex flex-col sm:flex-row gap-3 sm:items-center">
        <input id="admin-password" type="password" class="flex-1 px-4 py-3 rounded-xl border border-blush/60 focus:border-magenta focus:ring-2 focus:ring-blush/60" placeholder="Enter admin password" />
        <button id="admin-login-btn" class="px-5 py-3 rounded-xl bg-magenta text-white font-semibold hover:bg-magenta/90 transition">Login</button>
      </div>
      <p id="admin-login-status" class="text-sm text-charcoal/70"></p>
    </section>

    <section id="admin-panels" class="space-y-6 hidden">
      <div class="grid lg:grid-cols-2 gap-6">
        <section class="bg-white/80 border border-blush/50 rounded-2xl shadow-sm p-6 space-y-4">
          <div class="flex items-start justify-between gap-3">
            <div>
              <h3 class="text-lg font-semibold text-charcoal">Upload Invitee List</h3>
              <p class="text-sm text-charcoal/70">Upload CSV or JSON (name, party, contact).</p>
            </div>
            <button id="admin-save-invitees" class="px-4 py-2 rounded-xl bg-magenta text-white font-semibold hover:bg-magenta/90 transition">Save List</button>
          </div>
          <div class="space-y-3">
            <input id="admin-file" type="file" accept=".csv,.json" class="block text-sm text-charcoal/70" />
            <textarea id="admin-raw" rows="8" class="w-full px-4 py-3 rounded-xl border border-blush/60 focus:border-magenta focus:ring-2 focus:ring-blush/60" placeholder='Or paste JSON array here'></textarea>
            <div class="text-sm text-charcoal/70">Preview</div>
            <pre id="admin-preview" class="bg-charcoal text-blush/90 text-xs p-4 rounded-xl h-48 overflow-auto">[]</pre>
          </div>
          <p id="admin-upload-status" class="text-sm text-charcoal/70"></p>
        </section>

        <section class="bg-white/80 border border-blush/50 rounded-2xl shadow-sm p-6 space-y-4">
          <div class="flex items-center justify-between">
            <div>
              <h3 class="text-lg font-semibold text-charcoal">RSVP Responses</h3>
              <p class="text-sm text-charcoal/70">Live overview of submissions.</p>
            </div>
            <button id="admin-refresh" class="px-3 py-2 rounded-xl border border-blush/60 hover:border-magenta/40 text-sm transition">Refresh</button>
          </div>
          <div class="grid grid-cols-3 gap-3 text-center text-sm">
            <div class="p-3 rounded-xl bg-blush/40 text-magenta">
              <div class="font-semibold" id="count-yes">0</div>
              <div>Yes</div>
            </div>
            <div class="p-3 rounded-xl bg-amber-50 text-amber-700">
              <div class="font-semibold" id="count-maybe">0</div>
              <div>Maybe</div>
            </div>
            <div class="p-3 rounded-xl bg-blush/30 text-charcoal/80">
              <div class="font-semibold" id="count-no">0</div>
              <div>No</div>
            </div>
          </div>
          <div class="overflow-auto border border-blush/50 rounded-xl">
            <table class="min-w-full text-sm">
              <thead class="bg-blush/30 text-charcoal">
                <tr>
                  <th class="text-left px-3 py-2">Name</th>
                  <th class="text-left px-3 py-2">RSVP</th>
                  <th class="text-left px-3 py-2">Allergies</th>
                  <th class="text-left px-3 py-2">Note</th>
                  <th class="text-left px-3 py-2">Time</th>
                </tr>
              </thead>
              <tbody id="admin-rsvp-rows" class="divide-y divide-blush/40"></tbody>
            </table>
          </div>
          <p id="admin-rsvp-status" class="text-sm text-charcoal/70"></p>
        </section>
      </div>
    </section>
  </main>

  <script src="/scripts/admin.js"></script>
</body>
</html>
